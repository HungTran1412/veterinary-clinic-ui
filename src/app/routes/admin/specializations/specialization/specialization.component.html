<pro-page-header-wrapper [title]="title" [breadcrumb]="breadcrumb" (onBack)="goBack()">
  <nz-card [nzBordered]="false">
    <form nz-form class="search__form" [formGroup]="form">
      <div nz-row nzGutter="16">
        <nz-col [nzXs]="24" [nzSm]="12" [nzMd]="8" [nzLg]="8">
          <nz-form-item class="form-item-flex">
            <nz-form-label nzFor="textSearch">{{
              'app.common.button.search' | i18n
            }}</nz-form-label>
            <nz-form-control>
              <input
                class="custom-input"
                nz-input
                id="textSearch"
                formControlName="textSearch"
                (keyup.enter)="initGridData()"
                placeholder="{{ 'app.common.specialization.placeholder.search' | i18n }}"
              />
            </nz-form-control>
          </nz-form-item>
        </nz-col>
      </div>
    </form>
  </nz-card>

  <nz-card>
    <nz-row>
      <ag-grid-angular
        #agGrid
        style="width: 100%; height: 60vh"
        id="storage-location-grid"
        class="ag-theme-alpine"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [suppressRowClickSelection]="true"
        rowSelection="multiple"
        [rowData]="grid.rowData"
        (cellDoubleClicked)="onCellDoubleClicked($event)"
        [overlayLoadingTemplate]="overlayLoadingTemplate"
        [overlayNoRowsTemplate]="overlayNoRowsTemplate"
        [components]="frameworkComponents"
        (gridReady)="onGridReady($event)"
        (selectionChanged)="onSelectionChanged($event)"
      >
      </ag-grid-angular>
      <hr />
    </nz-row>
    <nz-pagination
      class="pagination"
      [nzTotal]="grid.totalData"
      [(nzPageIndex)]="filter.pageNumber"
      [nzPageSize]="filter.pageSize"
      [nzPageSizeOptions]="pageSizeOptions"
      (nzPageIndexChange)="onPageNumberChange()"
      (nzPageSizeChange)="onPageSizeChange()"
    ></nz-pagination>
  </nz-card>
</pro-page-header-wrapper>

<app-specialization-item
  #itemModal
  [isVisible]="modal.isShow"
  [item]="modal.item"
  [type]="modal.type"
  [option]="modal.option"
  (eventEmmit)="onModalEventEmmit($event)"
>
</app-specialization-item>

<ng-template #breadcrumb>
  <nz-row>
    <nz-col nzMd="12" nzSm="24" nzXs="24">
      <nz-breadcrumb class="ant-breadcrumb ng-star-inserted">
        <nz-breadcrumb-item class="ng-star-inserted">
          <span> {{ 'menu.category' | i18n }}</span>
        </nz-breadcrumb-item>
        <nz-breadcrumb-item class="ng-star-inserted">
          <span>{{ 'menu.specialization' | i18n }} </span>
        </nz-breadcrumb-item>
      </nz-breadcrumb>
    </nz-col>

    <nz-col nzMd="12" nzSm="24" nzXs="24" [class.text-right]="true" style="padding-bottom: 10px">
      <button
        nz-button
        nzType="primary"
        (click)="btnAdd.click($event)"
        class="btn-primary"
        *ngIf="btnAdd.visible && btnAdd.grandAccess"
      >
        <i nz-icon nzType="file-add" nzTheme="fill"></i>
        {{ btnAdd.title }}
      </button>
      <button nz-button nzType="primary" (click)="initGridData()" [nzLoading]="isLoading">
        {{ 'search.model.button' | i18n }}<i nz-icon nzType="search"></i>
      </button>
    </nz-col>
  </nz-row>
</ng-template>
