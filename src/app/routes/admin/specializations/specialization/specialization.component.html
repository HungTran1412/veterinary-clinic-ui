<div class="page-header">
  <div class="title">{{ 'menu.specialization' | i18n }}</div>
  <div class="actions">
    <button nz-button nzType="primary" (click)="btnAdd.click($event)">
      <i nz-icon nzType="plus"></i> {{ btnAdd.title }}
    </button>
  </div>
</div>

<div class="content">
  <div class="search-bar" style="margin-bottom: 16px;">
    <form nz-form class="search__form" [formGroup]="form">
      <nz-form-item>
        <nz-form-label nzFor="textSearch">{{ 'app.common.button.search' | i18n }}</nz-form-label>
        <nz-form-control>
          <input
            nz-input
            id="textSearch"
            formControlName="textSearch"
            (keyup.enter)="initGridData()"
            placeholder="{{ 'app.common.specialization.placeholder.search' | i18n }}"
          />
        </nz-form-control>
      </nz-form-item>

      <button nz-button nzType="primary" (click)="initGridData()" [nzLoading]="isLoading">
        <i nz-icon nzType="search"></i> {{ 'search.model.button' | i18n }}
      </button>
      <button nz-button nzType="default" (click)="onResetSearch(true)">
        <i nz-icon nzType="close"></i> {{ 'app.common.button.reset' | i18n }}
      </button>
    </form>
  </div>

  <ag-grid-angular
    #agGrid
    style="width: 100%; height: 500px"
    class="ag-theme-quartz"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [suppressRowClickSelection]="true"
    rowSelection="multiple"
    [rowData]="grid.rowData"
    (cellDoubleClicked)="onCellDoubleClicked($event)"
    [overlayLoadingTemplate]="overlayLoadingTemplate"
    [overlayNoRowsTemplate]="overlayNoRowsTemplate"
    [components]="frameworkComponents"
    (gridReady)="onGridReady($event)"
    (selectionChanged)="onSelectionChanged($event)"
  ></ag-grid-angular>

  <nz-pagination
    class="pagination"
    [nzTotal]="grid.totalData"
    [(nzPageIndex)]="filter.pageNumber"
    [nzPageSize]="filter.pageSize"
    [nzPageSizeOptions]="pageSizeOptions"
    (nzPageIndexChange)="onPageNumberChange()"
    (nzPageSizeChange)="onPageSizeChange()"
  ></nz-pagination>
</div>

<app-specialization-item
  #itemModal
  [isVisible]="modal.isShow"
  [item]="modal.item"
  [type]="modal.type"
  [option]="modal.option"
  (eventEmmit)="onModalEventEmmit($event)"
>
</app-specialization-item>
