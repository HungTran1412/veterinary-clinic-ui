<nz-modal
  [(nzVisible)]="isVisible"
  [nzTitle]="modalTitle"
  [nzContent]="modalContent"
  [nzFooter]="modalFooter"
  nzMaskClosable="false"
  nzWidth="800px"
  (nzOnCancel)="handleCancel()"
>
  <ng-template #modalTitle> {{ title }} </ng-template>

  <ng-template #modalContent>
    <nz-spin [nzSpinning]="isLoading">
      <div *ngIf="isLoading" class="brand-page-loading"></div>
      <form nz-form [formGroup]="form">
        <nz-row>
          <nz-col [nzXs]="24" [nzSm]="24" [nzMd]="24" [nzLg]="24">
            <nz-form-item>
              <nz-form-label nzRequired [nzSm]="6" [nzXs]="24">
                {{ 'function.specialization.modal.form.code' | i18n }}
              </nz-form-label>
              <nz-form-control
                [nzSm]="17"
                [nzXs]="24"
                nzErrorTip="{{ 'function.specialization.modal.form.code.required' | i18n }}"
              >
                <input
                  nz-input
                  formControlName="code"
                  placeholder="{{ 'function.specialization.modal.form.code.placeholder' | i18n }}"
                />
              </nz-form-control>
            </nz-form-item>
          </nz-col>
        </nz-row>

        <nz-row>
          <nz-col [nzXs]="24" [nzSm]="24" [nzMd]="24" [nzLg]="24">
            <nz-form-item>
              <nz-form-label nzRequired [nzSm]="6" [nzXs]="24">
                {{ 'function.specialization.modal.form.name' | i18n }}
              </nz-form-label>
              <nz-form-control
                [nzSm]="17"
                [nzXs]="24"
                nzErrorTip="{{ 'function.specialization.modal.form.name.required' | i18n }}"
              >
                <input
                  nz-input
                  formControlName="name"
                  placeholder="{{ 'function.specialization.modal.form.name.placeholder' | i18n }}"
                />
              </nz-form-control>
            </nz-form-item>
          </nz-col>
        </nz-row>

        <nz-row>
          <nz-col [nzXs]="24" [nzSm]="24" [nzMd]="24" [nzLg]="24">
            <nz-form-item>
              <nz-form-label [nzSm]="6" [nzXs]="24">
                {{ 'function.specialization.modal.form.description' | i18n }}
              </nz-form-label>
              <nz-form-control [nzSm]="17" [nzXs]="24">
                <textarea
                  nz-input
                  rows="3"
                  formControlName="description"
                  placeholder="{{
                    'function.specialization.modal.form.description.placeholder' | i18n
                  }}"
                ></textarea>
              </nz-form-control>
            </nz-form-item>
          </nz-col>
        </nz-row>
      </form>
    </nz-spin>
  </ng-template>

  <ng-template #modalFooter>
    <button
      nz-button
      nzType="primary"
      class="btn-secondary"
      *ngIf="btnEdit.visible && btnEdit.grandAccess"
      (click)="btnEdit.click($event)"
    >
      <i nz-icon nzType="edit" nzTheme="fill"></i>{{ btnEdit.title }}
    </button>

    <button
      nz-button
      nzType="primary"
      class="btn-primary"
      *ngIf="!isInfo && btnSave.visible && btnSave.grandAccess"
      [nzLoading]="isLoading"
      (click)="btnSave.click($event)"
    >
      <i nz-icon nzType="save" nzTheme="fill"></i>{{ btnSave.title }}
    </button>

    <button
      nz-button
      nzType="default"
      class="btn-warning"
      *ngIf="btnCancel.visible && btnCancel.grandAccess"
      (click)="btnCancel.click($event)"
    >
      <i nz-icon nzType="close-circle" nzTheme="fill"></i>{{ btnCancel.title }}
    </button>
  </ng-template>
</nz-modal>
